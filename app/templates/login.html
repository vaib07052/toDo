{% extends "base.html" %}

{% block title %}
Login
{% endblock %}

{% block content %}

<div class="auth-wrapper">

    <div class="login-box">

        <div class="form-icon">
            ✓
        </div>

        <h2>Welcome Back</h2>

        <p>
            Sign in to continue managing your tasks.
        </p>

        <form method="POST">

            <div class="form-group">

                <label for="username">Username</label>

                <input
                    type="text"
                    id="username"
                    name="username"
                    placeholder="Enter your username"
                    required>

            </div>

            <div class="form-group">

                <label for="password">Password</label>

                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Enter your password"
                    required>

            </div>

            <button type="submit" class="btn">
                Login
            </button>

        </form>

        <div class="divider">
            <span>OR</span>
        </div>

        <div class="auth-footer">

            Don't have an account?

            <br><br>

            <a class="link-btn" href="{{ url_for('auth.register') }}">
                Create Account
            </a>

        </div>

    </div>

</div>

{% endblock %}
